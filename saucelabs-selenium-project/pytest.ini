[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --html=reports/report.html --self-contained-html
markers =
    smoke: Smoke test cases
    regression: Regression test cases
    login: Login module tests
    products: Products module tests
    cart: Cart module tests
    checkout: Checkout module tests
    product_detail: Product detail module tests
