# ================================
# SauceDemo Java Selenium Framework
# Application Configuration
# ================================

# Application
application.base_url=https://www.saucedemo.com/

# Browser (chrome | firefox | edge)
browser.name=edge
browser.headless=false

# Timeouts (in seconds)
timeouts.implicit_wait=10
timeouts.explicit_wait=15
timeouts.page_load_timeout=30

# Sauce Labs Settings
saucelabs.url=https://ondemand.us-west-1.saucelabs.com:443/wd/hub
saucelabs.browser_name=chrome
saucelabs.browser_version=latest
saucelabs.platform_name=Windows 11
saucelabs.build_name=SauceDemo-Java-Regression
saucelabs.screen_resolution=1920x1080

# Test Data
test_data.valid_username=standard_user
test_data.valid_password=secret_sauce
test_data.locked_username=locked_out_user
test_data.problem_username=problem_user
